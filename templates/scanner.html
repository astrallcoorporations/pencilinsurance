<!DOCTYPE html>
<html lang="en" data-theme="default">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pouch Scanner — Pencil Insurance</title>
  <link rel="stylesheet" href="/static/themes.css">
  <link rel="icon" href="/static/logo.png" type="image/png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      cursor: none;
      overflow: hidden
    }

    body.touch-device {
      cursor: auto;
      overflow: auto;
      height: auto
    }

    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference
    }

    .cursor-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      opacity: .4
    }

    body.touch-device .cursor,
    body.touch-device .cursor-ring {
      display: none
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border)
    }

    .nav-logo {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .nav-back {
      color: var(--muted);
      text-decoration: none;
      font-size: .82rem;
      border: 1px solid var(--border);
      padding: .3rem .75rem;
      border-radius: 50px;
      transition: all .2s
    }

    .nav-back:hover {
      color: var(--accent);
      border-color: var(--accent)
    }

    .app {
      display: flex;
      height: 100vh;
      padding-top: 56px
    }

    @media(max-width:700px) {
      .app {
        flex-direction: column
      }

      ;

      body {
        overflow: auto;
        height: auto
      }

      ;

      html {
        height: auto
      }
    }

    /* camera */
    .cam-side {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity .4s
    }

    .frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .frame-inner {
      position: relative;
      width: min(320px, 76vw);
      height: min(320px, 76vw)
    }

    .corner {
      position: absolute;
      width: 26px;
      height: 26px;
      border-color: var(--accent);
      border-style: solid;
      transition: all .3s
    }

    .corner.tl {
      top: 0;
      left: 0;
      border-width: 3px 0 0 3px;
      border-radius: 4px 0 0 0
    }

    .corner.tr {
      top: 0;
      right: 0;
      border-width: 3px 3px 0 0;
      border-radius: 0 4px 0 0
    }

    .corner.bl {
      bottom: 0;
      left: 0;
      border-width: 0 0 3px 3px;
      border-radius: 0 0 0 4px
    }

    .corner.br {
      bottom: 0;
      right: 0;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 4px 0
    }

    .scanning .corner {
      width: 32px;
      height: 32px;
      border-color: var(--accent2)
    }

    .scan-line {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      top: 0;
      opacity: 0;
      box-shadow: 0 0 14px 2px var(--accent)
    }

    .is-scanning .scan-line {
      animation: scandown 1.6s ease-in-out infinite;
      opacity: 1
    }

    @keyframes scandown {
      0% {
        top: 0%
      }

      50% {
        top: 100%
      }

      100% {
        top: 0%
      }
    }

    .cam-hint {
      position: absolute;
      bottom: 7rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: .78rem;
      color: rgba(255, 255, 255, .5);
      letter-spacing: .04em;
      padding: 0 1rem
    }

    .cam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--muted);
      text-align: center;
      padding: 2rem
    }

    .cam-placeholder .icon {
      font-size: 3rem;
      opacity: .35
    }

    .controls {
      position: absolute;
      bottom: 1.75rem;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .scan-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: all .2s;
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 15%, transparent)
    }

    .scan-btn:hover:not(:disabled) {
      transform: scale(1.07);
      box-shadow: 0 0 0 12px color-mix(in srgb, var(--accent) 18%, transparent)
    }

    .scan-btn:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .scan-btn.pulsing {
      animation: pring 1.4s ease-in-out infinite
    }

    @keyframes pring {
      0% {
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 40%, transparent)
      }

      70% {
        box-shadow: 0 0 0 20px color-mix(in srgb, var(--accent) 0%, transparent)
      }

      100% {
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 0%, transparent)
      }
    }

    /* results */
    .results-side {
      width: 360px;
      flex-shrink: 0;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    @media(max-width:700px) {
      .cam-side {
        height: 55vmax;
        min-height: 300px;
        flex: none
      }

      .results-side {
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border)
      }
    }

    .results-head {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .results-tag {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .2rem;
      font-family: var(--font-mono)
    }

    .results-title {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 700
    }

    .results-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: .7rem;
      color: var(--muted);
      text-align: center;
      padding: 2rem
    }

    .empty-state .big {
      font-size: 2.8rem;
      opacity: .2
    }

    .empty-state p {
      font-size: .84rem;
      line-height: 1.65
    }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem
    }

    .spinner {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading-label {
      font-size: .82rem;
      color: var(--muted);
      font-family: var(--font-mono)
    }

    .item-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .9rem 1rem;
      margin-bottom: .6rem;
      animation: slideIn .3s ease both
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: .75rem
    }

    .item-emoji {
      font-size: 1.5rem;
      flex-shrink: 0
    }

    .item-name {
      font-weight: 600;
      font-size: .9rem;
      margin-bottom: .15rem
    }

    .item-conf {
      font-size: .68rem;
      color: var(--muted);
      font-family: var(--font-mono)
    }

    .item-plans {
      display: flex;
      gap: .3rem;
      flex-wrap: wrap;
      margin-top: .6rem
    }

    .pip {
      font-size: .65rem;
      font-weight: 700;
      padding: .2rem .55rem;
      border-radius: 50px;
      font-family: var(--font-mono)
    }

    .pip.yes {
      background: rgba(52, 211, 153, .12);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, .25)
    }

    .pip.no {
      background: var(--bg2);
      color: var(--muted);
      border: 1px solid var(--border)
    }

    .no-items {
      text-align: center;
      padding: 2rem 1rem
    }

    .no-items .icon {
      font-size: 2.5rem;
      margin-bottom: .75rem;
      opacity: .35
    }

    .no-items h3 {
      font-family: var(--font-head);
      font-size: 1rem;
      margin-bottom: .4rem
    }

    .no-items p {
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.65
    }

    .err-banner {
      background: rgba(248, 113, 113, .08);
      border: 1px solid rgba(248, 113, 113, .2);
      border-radius: 10px;
      padding: .85rem 1rem;
      color: #f87171;
      font-size: .82rem;
      line-height: 1.65
    }

    .plan-key {
      margin-top: 1.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border)
    }

    .plan-key-label {
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .6rem;
      font-family: var(--font-mono)
    }

    .plan-key-row {
      display: flex;
      align-items: baseline;
      gap: .45rem;
      margin-bottom: .38rem;
      font-size: .77rem;
      flex-wrap: wrap
    }

    .plan-key-name {
      font-weight: 600;
      min-width: 76px
    }

    .plan-key-price {
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: .73rem
    }

    .plan-key-desc {
      color: var(--muted)
    }

    .summary-bar {
      padding: .9rem 1.5rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: .8rem;
      margin-bottom: .3rem;
      color: var(--muted)
    }

    .summary-row strong {
      color: var(--text)
    }

    .retry-btn {
      display: block;
      width: 100%;
      padding: .6rem;
      margin-top: .7rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 50px;
      font-size: .86rem;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      transition: opacity .2s
    }

    .retry-btn:hover {
      opacity: .88
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      z-index: 900;
      background: var(--bg2);
      color: var(--text);
      padding: .5rem 1.2rem;
      border-radius: 50px;
      font-size: .8rem;
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .4);
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      white-space: nowrap
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1
    }
  </style>

<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>
  <div class="toast" id="toast"></div>
  <nav>
    <a href="/" class="nav-logo">✏️ Pencil Insurance</a>
    <a href="/profile" class="nav-back">← Profile</a>
  </nav>
  <div class="app">
    <!-- camera -->
    <div class="cam-side" id="camSide">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" style="display:none"></canvas>
      <div class="frame">
        <div class="frame-inner" id="frameInner">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="scan-line" id="scanLine"></div>
        </div>
      </div>
      <div class="cam-hint" id="camHint">Aim at your pencil pouch, then tap to scan</div>
      <div class="controls">
        <button class="scan-btn" id="captureBtn" disabled title="Scan my pouch">📷</button>
      </div>
    </div>

    <!-- results -->
    <div class="results-side">
      <div class="results-head">
        <div class="results-tag">// ai_vision</div>
        <div class="results-title">What's in your pouch?</div>
      </div>
      <div class="results-body" id="resultsBody">
        <div class="empty-state">
          <div class="big">🎒</div>
          <p>Point your camera at your pencil case and tap the scan button.</p>
          <p style="font-size:.75rem;margin-top:.2rem;opacity:.6">Claude AI will detect items and show which plan covers
            them.</p>
        </div>
      </div>
      <div class="summary-bar" id="summaryBar" style="display:none">
        <div class="summary-row"><span>Items detected</span><strong id="sumCount">0</strong></div>
        <div class="summary-row"><span>Covered by Default</span><strong id="sumDefault"
            style="color:var(--accent)">—</strong></div>
        <button class="retry-btn" onclick="resetScan()">↺ Scan again</button>
      </div>
    </div>
  </div>

  <script>
    const savedTheme = localStorage.getItem('pi-theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

    const cur = document.getElementById('cursor'), ring = document.getElementById('cursor-ring');
    let rx = 0, ry = 0;
    if (/Mobi|Android|iPad|iPhone/i.test(navigator.userAgent)) {
      document.body.classList.add('touch-device');
    } else {
      document.addEventListener('mousemove', e => { cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; });
      (function tick() { rx += (parseFloat(cur.style.left || 0) - rx) * .12; ry += (parseFloat(cur.style.top || 0) - ry) * .12; ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; requestAnimationFrame(tick) })();
    }

    function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3200) }
    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }

    const PLANS = ['Default', 'Deluxe', 'Ultra', 'Efficiency'];
    const PRICES = { Default: '₹60', Deluxe: '₹100', Ultra: '₹200', Efficiency: '₹1,000' };
    const DESCS = { Default: 'Pencil, eraser, sharpener, pen', Deluxe: '+Compass, scale, mech pencil', Ultra: '+Notebooks, markers, highlighters', Efficiency: '+Any item up to ₹900, art supplies' };

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const frameInner = document.getElementById('frameInner');
    const camHint = document.getElementById('camHint');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } });
        video.srcObject = stream;
        video.addEventListener('loadedmetadata', () => {
          captureBtn.disabled = false;
          camHint.textContent = 'Frame your pouch inside the box · tap to scan';
        });
      } catch (err) {
        document.getElementById('camSide').innerHTML = `<div class="cam-placeholder"><div class="icon">📷</div><p>Camera access denied or unavailable.<br><small style="opacity:.5">${err.message}</small></p><button onclick="startCamera()" style="margin-top:.5rem;background:var(--accent);color:var(--bg);border:none;padding:.5rem 1.2rem;border-radius:50px;cursor:pointer;font-family:var(--font-body)">Try again</button></div>`;
      }
    }
    startCamera();

    captureBtn.addEventListener('click', doScan);

    async function doScan() {
      if (video.videoWidth === 0 || video.videoHeight === 0) { showToast('Camera not ready — wait a moment'); return; }
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

      captureBtn.disabled = true; captureBtn.textContent = '⏳'; captureBtn.classList.add('pulsing');
      frameInner.classList.add('is-scanning');
      camHint.textContent = 'Analysing with Gemini AI…';
      document.getElementById('summaryBar').style.display = 'none';
      showResults('loading');

      try {
        const items = await analyseWithBackend(base64);
        showResults('items', items);
      } catch (err) {
        showResults('error', err.message);
      } finally {
        captureBtn.disabled = false; captureBtn.textContent = '📷'; captureBtn.classList.remove('pulsing');
        frameInner.classList.remove('is-scanning');
        camHint.textContent = 'Frame your pouch inside the box · tap to scan';
      }
    }

    async function analyseWithBackend(b64) {
      const resp = await fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: b64 })
      });
      if (!resp.ok) {
        const e = await resp.json().catch(() => ({}));
        throw new Error(e.error || `Server error: ${resp.status}`);
      }
      const data = await resp.json();
      if (!data.success) {
        throw new Error(data.error || 'Scan failed');
      }
      return data.items || [];
    }

    function planKeyHtml() {
      return `<div class="plan-key"><div class="plan-key-label">Plan coverage key</div>${PLANS.map(p => `<div class="plan-key-row"><span class="plan-key-name">${p}</span><span class="plan-key-price">${PRICES[p]}/mo</span><span class="plan-key-desc"> — ${DESCS[p]}</span></div>`).join('')}</div>`;
    }

    function showResults(state, data) {
      const body = document.getElementById('resultsBody');
      const sumBar = document.getElementById('summaryBar');

      if (state === 'loading') {
        body.innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-label">Gemini is scanning…</div></div>`;
        return;
      }
      if (state === 'error') {
        body.innerHTML = `<div class="err-banner">⚠️ ${esc(data)}</div><div style="margin-top:1rem;font-size:.8rem;color:var(--muted);line-height:1.6">Check your connection and try again. Good lighting helps accuracy.</div>`;
        sumBar.style.display = 'none';
        return;
      }

      const items = data;
      if (!items.length) {
        body.innerHTML = `<div class="no-items"><div class="icon">🔍</div><h3>Nothing detected</h3><p>Try better lighting, hold steady, and make sure items fill the frame.</p></div>${planKeyHtml()}`;
        sumBar.style.display = 'none';
        return;
      }

      let html = '';
      items.forEach((item, i) => {
        const idx = PLANS.indexOf(item.lowestPlanCovered);
        const pips = PLANS.map((p, pi) => {
          const covered = idx >= 0 && pi >= idx;
          return `<span class="pip ${covered ? 'yes' : 'no'}">${p}</span>`;
        }).join('');
        html += `<div class="item-card" style="animation-delay:${i * .06}s"><div class="item-row"><div class="item-emoji">${item.emoji || '📎'}</div><div><div class="item-name">${esc(item.name)}</div><div class="item-conf">${item.confidence === 'high' ? '✓ Confident' : item.confidence === 'medium' ? '~ Likely' : '? Possible'}${item.notes ? ' · ' + esc(item.notes) : ''}</div></div></div><div class="item-plans">${pips}</div></div>`;
      });
      html += planKeyHtml();
      body.innerHTML = html;

      const defCount = items.filter(i => PLANS.indexOf(i.lowestPlanCovered) === 0).length;
      document.getElementById('sumCount').textContent = items.length;
      document.getElementById('sumDefault').textContent = `${defCount}/${items.length}`;
      sumBar.style.display = 'block';
    }

    function resetScan() {
      document.getElementById('resultsBody').innerHTML = `<div class="empty-state"><div class="big">🎒</div><p>Point your camera at your pencil case and tap the scan button.</p></div>`;
      document.getElementById('summaryBar').style.display = 'none';
    }
  </script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

<script src="/static/global-animations.js" defer></script>
